spring.application.name=ytkoj

# env \uC124\uC815\uC744 \uAC00\uC838\uC635\uB2C8\uB2E4.
# \uC774\uD6C4 env\uC5D0\uC11C \uC124\uC815\uB41C \uBCC0\uC218\uB294 ${\uBCC0\uC218\uBA85}\uC73C\uB85C \uAC00\uC838\uC624\uBA74\uB428.
spring.config.import=optional:file:.env[.properties]

# \uC124\uC815 \uD504\uB85C\uD544\uC744 \uC9C0\uC815\uD569\uB2C8\uB2E4.
spring.profiles.active=${PROFILE}

# DB \uC124\uC815
spring.jpa.database=mysql
# ddl-auto\uC758 \uAE30\uBCF8 \uC124\uC815\uC740 none\uC73C\uB85C \uC124\uC815\uD558\uACE0 \uAC01 \uD504\uB85C\uD544\uC5D0\uC11C \uC624\uBC84\uB85C\uB529 \uD544\uC694
spring.jpa.hibernate.ddl-auto=none
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USER_NAME}
spring.datasource.password=${DB_PASSWORD}

# jwt \uC124\uC815
jwt.issuer=ytkoj
jwt.typ=JWT
jwt.alg=HS256
jwt.secret-key=${JWT_SECRET_KEY}